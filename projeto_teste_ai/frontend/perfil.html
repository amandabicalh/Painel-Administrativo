<!DOCTYPE html>
<html>

<head>
<title>Perfil</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h1{
margin-bottom:20px;
}

.info{
margin-bottom:15px;
font-size:16px;
}

.label{
font-weight:bold;
}

.buttons{
margin-top:25px;
display:flex;
gap:10px;
}

button{
background:#b791dd;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.logout{
background:#ff4d4d;
}

button:hover{
opacity:0.9;
}

.perfil-card{
max-width:400px;
margin:auto;
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
text-align:center;
}

.perfil-avatar{
width:80px;
height:80px;
border-radius:50%;
background:#6c5ce7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:0 auto 20px auto;
}

.perfil-info{
margin-top:20px;
text-align:left;
}

.info-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<div class="perfil-card">

<div class="perfil-avatar" id="avatarPerfil"></div>

<h2 id="email"></h2>

<div class="perfil-info">

<div class="info-item">
<span>ID:</span>
<span id="id"></span>
</div>

<div class="info-item">
<span>Email:</span>
<span id="emailInfo"></span>
</div>

</div>

<button onclick="voltar()">Voltar ao Dashboard</button>

</div>

</div>

<script>

const token = localStorage.getItem("token");
const usuarioLogado = localStorage.getItem("usuarioLogado");

if(!token || !usuarioLogado){
alert("Sessão expirada. Faça login novamente.");
window.location.href="index.html";
}

async function carregarPerfil(){

try{

const resposta = await fetch("http://127.0.0.1:5000/me",{
headers:{
Authorization:"Bearer " + token
}
});

if(!resposta.ok){
throw new Error("Sessão inválida");
}

const usuario = await resposta.json();

/* preencher dados */

document.getElementById("id").textContent = usuario.id;
document.getElementById("email").textContent = usuario.email;
document.getElementById("emailInfo").textContent = usuario.email;

/* avatar com inicial do email */

document.getElementById("avatarPerfil").textContent =
usuario.email.charAt(0).toUpperCase();

}catch(erro){

alert("Sessão expirada. Faça login novamente.");
logout();

}

}

function voltar(){
window.location.href="dashboard.html";
}

function logout(){

localStorage.removeItem("usuarioLogado");
localStorage.removeItem("token");

window.location.href="index.html";

}

carregarPerfil();

</script>


</body>
</html>
