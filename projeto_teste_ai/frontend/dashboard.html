<!DOCTYPE html>
<html>

<head>
<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
display:flex;
background:#f4f6fb;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#6c5ce7,#4834d4);
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
box-shadow:4px 0 20px rgba(0,0,0,0.1);
}

.sidebar h2{
font-size:22px;
margin-bottom:40px;
font-weight:600;
letter-spacing:1px;
}

.user-info{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
padding-bottom:20px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:white;
color:#6c5ce7;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:16px;
}

.user-email{
font-size:13px;
opacity:0.9;
word-break:break-all;
}

.sidebar button{
display:flex;
align-items:center;
gap:10px;
background:transparent;
border:none;
color:white;
font-size:15px;
padding:12px 14px;
border-radius:8px;
cursor:pointer;
transition:all 0.25s ease;
}

.sidebar button:hover{
background:rgba(255,255,255,0.15);
transform:translateX(5px);
}

.sidebar button.active{
background:rgba(255,255,255,0.25);
font-weight:600;
}

.sidebar button:last-child{
margin-top:auto;
background:rgba(0,0,0,0.15);
}



/* MAIN AREA */

.main{
flex:1;
padding:40px;
}

/* HEADER */

header{
margin-bottom:30px;
}

header h1{
color:#333;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
display:flex;
align-items:center;
gap:15px;
transition:0.25s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.card h3{
color:#777;
font-size:15px;
margin-bottom:4px;
}

.card p{
font-size:22px;
font-weight:bold;
}

/* Ícone */

.card-icon{
width:45px;
height:45px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:white;
}

/* cores diferentes */

.card-usuario .card-icon{
background:linear-gradient(135deg,#6c5ce7,#8e7dff);
}

.card-total .card-icon{
background:linear-gradient(135deg,#00b894,#55efc4);
}

/* GRAFICO */

.grafico{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#b791dd;
color:white;
}

tr:hover{
background:#f8f8f8;
}

.delete{
background:#ff4d4d;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.delete:hover{
background:#e60000;
}

.topo-tabela{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

.novo-usuario{
background:#6c5ce7;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.novo-usuario:hover{
background:#574bdb;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
animation:fadeIn 0.3s ease;
}

.modal-conteudo{
background:white;
padding:35px;
border-radius:14px;
width:340px;
display:flex;
flex-direction:column;
gap:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
animation:slideUp 0.3s ease;
}

.modal-conteudo h2{
margin-bottom:10px;
color:#333;
}

.modal-conteudo input{
padding:11px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

.modal-conteudo input:focus{
outline:none;
border-color:#6c5ce7;
}

.modal-botoes{
display:flex;
gap:10px;
margin-top:10px;
}

.modal-botoes button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
cursor:pointer;
font-weight:500;
transition:0.2s;
}

.modal-botoes button:hover{
background:#574bdb;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
width:300px;
}

.modal-buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
}

.cancelar{
background:#bbb !important;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{
transform:translateY(20px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

body.dark{
background:#1e1e2f;
color:white;
}

body.dark .card,
body.dark .grafico,
body.dark table{
background:#2a2a3d;
color:white;
}

body.dark th{
background:#6c5ce7;
color:white;
}

body.dark td{
border-bottom:1px solid #444;
color:white;
}

body.dark header h1{
color:white;
}

body.dark .busca input{
background:#2a2a3d;
color:white;
border:1px solid #555;
}

body.dark .card h3{
color:#ccc;
}

body.dark .card p{
color:white;
}

body.dark .grafico h3{
color:white;
}
.grafico canvas{
max-width:350px;
margin:auto;
display:block;
}

.busca{
margin-bottom:15px;
}

.busca input{
width:250px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
 
<div class="sidebar">

<h2>⚡ Admin Panel</h2>

<div class="user-info">

<div class="avatar" id="avatar"></div>

<div class="user-email" id="emailSidebar"></div>

</div>

<button class="active" onclick="irDashboard()">🏠 Dashboard</button>

<button onclick="irPerfil()">👤 Perfil</button>

<button onclick="irSobre()">ℹ Sobre</button>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<button onclick="logout()">🚪 Logout</button>

</div>


<!-- CONTEÚDO -->

<div class="main">

<header>
<h1>Painel Administrativo</h1>
</header>

<div class="cards">

<div class="card card-usuario">

<div class="card-icon">👤</div>

<div>
<h3>Usuário logado</h3>
<p id="usuario"></p>
</div>

</div>

<div class="card card-total">

<div class="card-icon">👥</div>

<div>
<h3>Total de usuários</h3>
<p id="contador"></p>
</div>

</div>

</div>

<div class="grafico">
<h3 style="margin-bottom:20px;">Usuários no sistema</h3>
<canvas id="graficoUsuarios"></canvas>
</div>

<div class="topo-tabela">
  <button class="novo-usuario" onclick="abrirModal()">+ Novo usuário</button>
</div>


<div class="busca">

<input 
type="text" 
id="buscarUsuario" 
placeholder="Buscar usuário..."
onkeyup="filtrarUsuarios()">

</div>

<div id="modalExcluir" class="modal">

<div class="modal-box">

<h3>⚠ Confirmar exclusão</h3>

<p>Tem certeza que deseja excluir este usuário?</p>

<div class="modal-buttons">
<button onclick="fecharModalExcluir()">Cancelar</button>
<button class="delete" onclick="confirmarExcluir()">Excluir</button>
</div>

</div>

</div>

<table>

<thead>
<tr>
<th onclick="ordenarTabela('id')">ID ⬍</th>
<th onclick="ordenarTabela('email')">Email ⬍</th>
<th>Criado em</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaUsuarios"></tbody>

</table>

</div>


<script>

const usuario = localStorage.getItem("usuarioLogado");
const token = localStorage.getItem("token");

if(!usuario || !token){
window.location.href="index.html";
}

document.getElementById("usuario").textContent = usuario;

document.getElementById("emailSidebar").textContent = usuario;

const inicial = usuario.charAt(0).toUpperCase();
document.getElementById("avatar").textContent = inicial;

let grafico = null;

async function carregarUsuarios(){

const resposta = await fetch("http://127.0.0.1:5000/usuarios",{

headers:{
Authorization:"Bearer " + token
}

});

if(!resposta.ok){

alert("Sessão expirada. Faça login novamente.");
logout();
return;

}

const usuarios = await resposta.json();

animarContador(usuarios.length);

criarGrafico(usuarios.length);

const tabela = document.getElementById("tabelaUsuarios");

tabela.innerHTML="";

usuarios.forEach(u=>{

const podeExcluir = u.email !== usuario;

const linha=document.createElement("tr");

linha.innerHTML=`

<td>${u.id}</td>
<td>${u.email}</td>
<td>${u.criado_em || "—"}</td>
<td>
${podeExcluir ? `<button class="delete" onclick="abrirModalExcluir(${u.id})">Excluir</button>` : ""}
</td>

`;

tabela.appendChild(linha);

});

}

function criarGrafico(total){

const ctx = document.getElementById("graficoUsuarios");

if(grafico){
grafico.destroy();
}

grafico = new Chart(ctx,{

type:"doughnut",

data:{
labels:["Usuários cadastrados"],
datasets:[{
data:[total],
backgroundColor:["#6c5ce7"],
borderWidth:0
}]
},

options:{
responsive:true,

plugins:{
legend:{
display:false
}
},

cutout:"70%"

}

});

}

async function deletarUsuario(id){

const confirmar = confirm("Deseja realmente excluir este usuário?");

if(!confirmar){
return;
}

await fetch(`http://127.0.0.1:5000/usuarios/${id}`,{
method:"DELETE",
headers:{
Authorization:"Bearer " + token
}
});

alert("Usuário excluído com sucesso");

carregarUsuarios();

}

function irPerfil(){
window.location.href="perfil.html";
}

function irDashboard(){
window.location.href="dashboard.html";
}

function logout(){

localStorage.removeItem("usuarioLogado");
localStorage.removeItem("token");

window.location.href="index.html";

}

carregarUsuarios();

function abrirModal(){
document.getElementById("modalUsuario").style.display="flex";
}
function fecharModalUsuario(){
document.getElementById("modalUsuario").style.display="none";
}


async function criarUsuario(){

const email=document.getElementById("novoEmail").value;
const senha=document.getElementById("novaSenha").value;

const resposta=await fetch("http://127.0.0.1:5000/cadastro",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
senha:senha
})

});

const dados=await resposta.json();

alert(dados.mensagem || dados.erro);

fecharModal();

carregarUsuarios();

}

function animarContador(valor){

let atual = 0;

const intervalo = setInterval(()=>{

atual++;

document.getElementById("contador").textContent = atual;

if(atual >= valor){
clearInterval(intervalo);
}

},30);

}

function toggleDarkMode(){

document.body.classList.toggle("dark");

}

function filtrarUsuarios(){

const filtro = document
.getElementById("buscarUsuario")
.value
.toLowerCase();

const linhas = document.querySelectorAll("#tabelaUsuarios tr");

linhas.forEach(linha => {

const email = linha.children[1].textContent.toLowerCase();

linha.style.display = email.includes(filtro) ? "" : "none";

});

}

let usuarioParaExcluir = null;

function abrirModalExcluir(id){
usuarioParaExcluir = id;
document.getElementById("modalExcluir").style.display="flex";
}

function fecharModalExcluir(){
document.getElementById("modalExcluir").style.display="none";
}

async function confirmarExcluir(){

await fetch(`http://127.0.0.1:5000/usuarios/${usuarioParaExcluir}`,{

method:"DELETE",

headers:{
Authorization:"Bearer " + token
}

});

fecharModal();
carregarUsuarios();

}

let ordem = {
id:true,
email:true
};

function ordenarTabela(campo){

const tabela = document.getElementById("tabelaUsuarios");

const linhas = Array.from(tabela.querySelectorAll("tr"));

linhas.sort((a,b)=>{

const aValor = a.children[campo==="id"?0:1].textContent;
const bValor = b.children[campo==="id"?0:1].textContent;

if(ordem[campo]){
return aValor.localeCompare(bValor,undefined,{numeric:true});
}else{
return bValor.localeCompare(aValor,undefined,{numeric:true});
}

});

ordem[campo] = !ordem[campo];

tabela.innerHTML="";
linhas.forEach(l=>tabela.appendChild(l));

}

function irSobre(){
window.location.href="sobre.html";
}


</script>

<div id="modalUsuario" class="modal">

  <div class="modal-conteudo">

    <h2>Novo Usuário</h2>

    <input id="novoEmail" type="email" placeholder="Email">

    <input id="novaSenha" type="password" placeholder="Senha">

    <div class="modal-botoes">
      <button onclick="criarUsuario()">Criar</button>
      <button class="cancelar" onclick="fecharModalUsuario()">Cancelar</button>
    </div>

  </div>

</div>

</body>
</html>
