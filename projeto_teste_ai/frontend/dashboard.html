<!DOCTYPE html>
<html>

<head>
<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:#f4f6fb;
min-height:100vh;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

header h1{
color:#333;
}

.logout{
background:#b791dd;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h3{
color:#666;
margin-bottom:8px;
}

.card p{
font-size:22px;
font-weight:bold;
color:#333;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#b791dd;
color:white;
}

.delete{
background:#ff4d4d;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.delete:hover{
background:#e60000;
}

.grafico{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="container">

<header>
<h1>Painel Administrativo</h1>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="cards">

<div class="card">
<h3>Usuário logado</h3>
<p id="usuario"></p>
</div>

<div class="card">
<h3>Total de usuários</h3>
<p id="contador"></p>
</div>

</div>

<div class="grafico">
<h3 style="margin-bottom:20px;">Usuários no sistema</h3>
<canvas id="graficoUsuarios"></canvas>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Email</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaUsuarios"></tbody>

</table>

</div>

<script>

const usuario = localStorage.getItem("usuarioLogado");
const token = localStorage.getItem("token");

if(!usuario || !token){
window.location.href="index.html";
}

document.getElementById("usuario").textContent = usuario;

let grafico = null;


async function carregarUsuarios(){

const resposta = await fetch("http://127.0.0.1:5000/usuarios",{

headers:{
Authorization: "Bearer " + token
}

});

if(!resposta.ok){

alert("Sessão expirada. Faça login novamente.");
logout();
return;

}

const usuarios = await resposta.json();

document.getElementById("contador").textContent = usuarios.length;

criarGrafico(usuarios.length);

const tabela = document.getElementById("tabelaUsuarios");

tabela.innerHTML="";

usuarios.forEach(u=>{

const podeExcluir = u.email !== usuario;

const linha=document.createElement("tr");

linha.innerHTML=`

<td>${u.id}</td>
<td>${u.email}</td>
<td>
${podeExcluir ? `<button class="delete" onclick="deletarUsuario(${u.id})">Excluir</button>` : ""}
</td>

`;

tabela.appendChild(linha);

});

}


function criarGrafico(total){

const ctx = document.getElementById("graficoUsuarios");

if(grafico){
grafico.destroy();
}

grafico = new Chart(ctx,{

type:"bar",

data:{
labels:["Usuários cadastrados"],
datasets:[{
label:"Total",
data:[total],
backgroundColor:"#b791dd"
}]
},

options:{
responsive:true,
scales:{
y:{
beginAtZero:true
}
}
}

});

}


async function deletarUsuario(id){

const confirmar = confirm("Tem certeza que deseja excluir este usuário?");

if(!confirmar){
return;
}

await fetch(`http://127.0.0.1:5000/usuarios/${id}`,{

method:"DELETE",

headers:{
Authorization:"Bearer " + token
}

});

carregarUsuarios();

}


function logout(){

localStorage.removeItem("usuarioLogado");
localStorage.removeItem("token");

window.location.href="index.html";

}

carregarUsuarios();

</script>

</body>
</html>
